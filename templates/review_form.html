<!DOCTYPE html>
<html>

<head>
  <title>Review Project</title>
  <link rel="stylesheet" href="/static/css/globals.css">
  <link rel="icon" href="/static/images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="BuildHub helps developers learn by building real-world projects, earning XP, badges and proof of skill.">

  <meta name="keywords" content="BuildHub, coding projects, developer portfolio, student projects, coding practice">

  <meta name="author" content="BuildHub">

  <meta property="og:title" content="BuildHub">
  <meta property="og:description" content="Learn by Building Real Projects">
  <meta property="og:image" content="/static/images/logo.png">
  <meta property="og:type" content="website">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fb;
      margin: 0;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 15px 30px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    .header a {
      text-decoration: none;
      color: #000;
    }

    /* CONTAINER */
    .container {
      max-width: 700px;
      margin: 50px auto;
      padding: 0 20px;
    }

    /* CARD */
    .card {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;

      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    h2 {
      margin-bottom: 20px;
    }

    /* FORM */
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    /* INPUT */
    input {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #000;
    }

    /* TEXTAREA */
    textarea {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      min-height: 120px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #000;
    }

    /* BUTTON */
    button {
      margin-top: 10px;
      padding: 12px;

      background: #000;
      color: #fff;

      border: none;
      border-radius: 6px;

      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #333;
    }

    /* SCORE INFO */
    .hint {
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body class="{{ user.theme if user.theme else 'light' }}">

  <div class="header">
    <h3>Review Project</h3>
    <a href="/reviews">Back</a>
  </div>

  <div class="container">

    <div class="card">

      <div class="card" style="margin-bottom:20px;">

        <h3>{{ project.title }}</h3>

        <p><strong>GitHub:</strong>
          <a href="{{ submission.github }}" target="_blank">
            {{ submission.github }}
          </a>
        </p>

        <p><strong>Live Site:</strong>
          <a href="{{ submission.live }}" target="_blank">
            {{ submission.live }}
          </a>
        </p>

      </div>

      <h2>Give Your Review</h2>

      <form method="POST">

        <label>Score (0 - 100)</label>
        <input type="number" name="score" min="0" max="100" required>

        <p class="hint">Be fair and evaluate based on quality, functionality, and design</p>

        <label>Feedback</label>
        <textarea name="feedback" placeholder="Write your feedback..."></textarea>

        <button type="submit">Submit Review</button>

      </form>

    </div>

  </div>

</body>

</html>
