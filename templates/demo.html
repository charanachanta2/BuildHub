<!DOCTYPE html>
<html>
<head>
  <title>BuildHub</title>
  <link rel="icon" href="/static/images/favicon.png">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
    }

    /* 🌙 THEME */
    body.light {
      background: #f5f5f5;
      color: #000;
    }

    body.dark {
      background: #0f172a;
      color: #fff;
    }

    /* 🔝 HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    body.dark .header {
      background: #1e293b;
      border-color: #334155;
    }

    .logo a {
      font-weight: bold;
      text-decoration: none;
      font-size: 18px;
      color: black;
    }

    body.dark .logo a {
      color: white;
    }

    .right-section {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* 👤 AVATAR */
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
    }

    /* 🔔 NOTIFICATIONS */
    .bell {
      cursor: pointer;
      font-size: 18px;
    }

    /* 📦 DROPDOWN */
    .dropdown {
      position: absolute;
      right: 0;
      top: 50px;
      width: 220px;
      background: white;
      border: 1px solid #eee;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      z-index: 100;
    }

    body.dark .dropdown {
      background: #1e293b;
      border-color: #334155;
    }

    .dropdown a {
      display: block;
      padding: 10px 15px;
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    body.dark .dropdown a {
      color: white;
    }

    .dropdown a:hover {
      background: #f5f5f5;
    }

    body.dark .dropdown a:hover {
      background: #334155;
    }

    .dropdown hr {
      margin: 5px 0;
      border: none;
      border-top: 1px solid #eee;
    }

    .hidden {
      display: none;
    }

    .profile-menu, .notif-menu {
      position: relative;
    }

    /* 📦 CONTENT */
    .container {
      padding: 30px;
    }

  </style>
</head>

<body class="{{ user.theme if user.theme else 'light' }}">

<!-- 🔝 HEADER -->
<div class="header">

  <!-- LOGO -->
  <div class="logo">
    <a href="/dashboard">BuildHub</a>
  </div>

  <!-- RIGHT -->
  <div class="right-section">

    <!-- 🔔 NOTIFICATIONS -->
    <div class="notif-menu">
      <div class="bell" onclick="toggleNotif()">🔔</div>

      <div id="notifDropdown" class="dropdown hidden">
        <div id="notifList">Loading...</div>
      </div>
    </div>

    <!-- 👤 PROFILE -->
    <div class="profile-menu">

      <div class="avatar" onclick="toggleMenu()">
        {{ user.username[0] | upper }}
      </div>

      <div id="profileDropdown" class="dropdown hidden">

        

        <hr>

        <a href="/logout">🚪 Logout</a>

      </div>

    </div>

  </div>

</div>

<!-- 📦 PAGE CONTENT -->
<div class="container">

<h2>⚙ Settings</h2>

<form method="POST">

  <!-- PUBLIC PROFILE -->
  <label>
    <input type="checkbox" name="is_public"
      {% if user.is_public %}checked{% endif %}>
    Public Profile
  </label>

  <!-- THEME SELECT -->
  <label>Theme:</label>
  <select name="theme">
    <option value="light" {% if user.theme=='light' %}selected{% endif %}>Light</option>
    <option value="dark" {% if user.theme=='dark' %}selected{% endif %}>Dark</option>
  </select>

  <button type="submit">Save Settings</button>

</form>

<!-- 🔥 TOGGLE BUTTON (OUTSIDE FORM) -->
<button type="button" onclick="toggleTheme()">🌙 Toggle Dark Mode</button>

</div>

<!-- ⚡ JS -->
<script>
function toggleMenu() {
  document.getElementById("profileDropdown").classList.toggle("hidden");
}

function toggleNotif() {
  let dropdown = document.getElementById("notifDropdown");
  dropdown.classList.toggle("hidden");

  fetch("/get_notifications")
    .then(res => res.json())
    .then(data => {
      let html = "";

      data.notifications.forEach(n => {
        html += `<div style="padding:8px;border-bottom:1px solid #eee;">${n.message}</div>`;
      });

      document.getElementById("notifList").innerHTML =
        html || "No notifications";
    });
}

// close dropdowns
document.addEventListener("click", function(e) {
  const profile = document.querySelector(".profile-menu");
  const notif = document.querySelector(".notif-menu");

  if (!profile.contains(e.target)) {
    document.getElementById("profileDropdown").classList.add("hidden");
  }

  if (!notif.contains(e.target)) {
    document.getElementById("notifDropdown").classList.add("hidden");
  }
});
</script>

</body>
</html>
