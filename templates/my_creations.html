<!DOCTYPE html>
<html>

<head>
  <title>My Creations - BuildHub</title>
  <link rel="stylesheet" href="/static/css/nav.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="BuildHub helps developers learn by building real-world projects, earning XP, badges and proof of skill.">

  <meta name="keywords" content="BuildHub, coding projects, developer portfolio, student projects, coding practice">

  <meta name="author" content="BuildHub">

  <meta property="og:title" content="BuildHub">
  <meta property="og:description" content="Learn by Building Real Projects">
  <meta property="og:image" content="/static/images/logo.png">
  <meta property="og:type" content="website">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
      margin: 0;
      background: #f5f5f5;
    }

    /* 🌙 DARK MODE */
    body.dark {
      background: #0f172a;
      color: #fff;
    }

    /* HEADER SPACE FIX */
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .top-bar h2 {
      margin: 0;
    }

    .create-btn {
      padding: 10px 15px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      transition: 0.2s;
    }

    .create-btn:hover {
      background: #333;
    }

    /* GRID */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #eee;
      transition: 0.3s;
      position: relative;
    }

    body.dark .card {
      background: #1e293b;
      border-color: #334155;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card h3 {
      margin: 0 0 10px;
    }

    /* META */
    .meta {
      font-size: 12px;
      color: #777;
      margin-bottom: 10px;
    }

    body.dark .meta {
      color: #aaa;
    }

    /* ACTIONS */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
    }

    .view {
      background: #eee;
      color: #333;
    }

    .edit {
      background: black;
      color: white;
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      margin-top: 60px;
      color: #888;
    }
  </style>
</head>

<body class="{{ user.theme if user and user.theme else 'light' }}">
  <header class="top-nav">

    <div class="nav-left">
      <a href="/dashboard" class="logo">
        <img src="/static/images/logo.png">
        <span>BuildHub</span>
      </a>
    </div>

    <div class="nav-right">
      <a href="/dashboard">Dashboard</a>
      <a href="/projects">Explore</a>
      <a href="/my_projects">My Work</a>
      <a href="/my_creations">My Creations</a>
      <a href="/leaderboard">Leaderboard</a>
    </div>

  </header>
  <div class="container">

    <!-- 🔝 TOP -->
    <div class="top-bar">
      <h2>🚀 My Creations</h2>
      <a href="/create_project" class="create-btn">+ Create Project</a>
    </div>

    <!-- 📦 PROJECT GRID -->
    {% if projects %}
    <div class="projects">

      {% for p in projects %}
      <div class="card">

        <h3>{{ p.title }}</h3>

        <div class="meta">
          Created by you
        </div>

        <div class="actions">
          <a href="/project/{{ p._id }}" class="btn view">View</a>
          <a href="/edit_project/{{ p._id }}" class="btn edit">Edit</a>
        </div>

      </div>
      {% endfor %}

    </div>

    {% else %}

    <!-- EMPTY STATE -->
    <div class="empty">
      <h3>No projects yet</h3>
      <p>Start building something awesome 🚀</p>
    </div>

    {% endif %}

  </div>

</body>

</html>
