<!DOCTYPE html>
<html>

<head>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/globals.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="BuildHub helps developers learn by building real-world projects, earning XP, badges and proof of skill.">

  <meta name="keywords" content="BuildHub, coding projects, developer portfolio, student projects, coding practice">

  <meta name="author" content="BuildHub">

  <meta property="og:title" content="BuildHub">
  <meta property="og:description" content="Learn by Building Real Projects">
  <meta property="og:image" content="/static/images/logo.png">
  <meta property="og:type" content="website">
</head>

<body>

  <div class="container">
    <div class="auth-box">

      <h1>Reset Password</h1>
      <p>Enter your email to receive reset instructions.</p>

      <form method="POST">
        <input type="email" name="email" placeholder="Email address" required>
        <button type="submit">Send Reset Link</button>
      </form>

      {% if success %}
      <div class="alert flash-msg">{{ success }}</div>
      {% endif %}

      <p><a href="/login">Back to login</a></p>

    </div>
  </div>

</body>

</html>
