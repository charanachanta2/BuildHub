<!DOCTYPE html>
<html>
<head>
    <title>Submit Project</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fb;
            margin: 0;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 15px 30px;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
        }

        .header a {
            text-decoration: none;
            color: #000;
            font-size: 14px;
        }

        /* CONTAINER */
        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }

        /* CARD */
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;

            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 {
            margin-bottom: 20px;
        }

        /* FORM */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
        }

        input {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #000;
        }

        /* FILE INPUT */
        input[type="file"] {
            padding: 8px;
            background: #f5f5f5;
        }

        /* BUTTON */
        button {
            margin-top: 10px;
            padding: 12px;

            background: #000;
            color: #fff;

            border: none;
            border-radius: 6px;

            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #333;
        }

        /* HELPER TEXT */
        .hint {
            font-size: 12px;
            color: #777;
        }

    </style>

</head>

<body>

<div class="header">
    <h3>Submit Project</h3>
    <a href="/dashboard">Back</a>
</div>

<div class="container">

    <div class="card">

        <h2>Project Submission</h2>

        <form method="POST" enctype="multipart/form-data">

            <label>GitHub Repository</label>
            <input type="text" name="github" placeholder="https://github.com/...">

            <label>Live Website</label>
            <input type="text" name="live" placeholder="https://your-site.com">

            <label>Documentation (PDF / DOC)</label>
            <input type="file" name="doc">

            <p class="hint">Make sure your project is complete before submitting</p>

            <button type="submit">Submit Project</button>

        </form>

    </div>

</div>

</body>
</html>
