<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="BuildHub helps developers learn by building real-world projects, earning XP, badges and proof of skill.">

  <meta name="keywords" content="BuildHub, coding projects, developer portfolio, student projects, coding practice">

  <meta name="author" content="BuildHub">

  <meta property="og:title" content="BuildHub">
  <meta property="og:description" content="Learn by Building Real Projects">
  <meta property="og:image" content="/static/images/logo.png">
  <meta property="og:type" content="website">
  <title>Create Project - BuildHub</title>
  <link rel="stylesheet" href="/static/css/nav.css">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
      margin: 0;
      background: #f5f5f5;
      color: #1e293b;
    }

    body.dark {
      background: #0f172a;
      color: #f8fafc;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 650px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      text-decoration: none;
      font-size: 14px;
      color: #64748b;
    }

    .header {
      margin-bottom: 25px;
    }

    .header h2 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin-top: 8px;
      color: #64748b;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }

    body.dark .card {
      background: #1e293b;
      border-color: #334155;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }

    input,
    textarea {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      outline: none;
    }

    body.dark input,
    body.dark textarea {
      background: #0f172a;
      border-color: #334155;
      color: white;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    /* FILE INPUT */
    .file-input {
      padding: 10px;
      background: #f1f5f9;
      border-radius: 10px;
      border: 1px dashed #cbd5e1;
      cursor: pointer;
    }

    body.dark .file-input {
      background: #0f172a;
      border-color: #334155;
    }

    .btn {
      padding: 16px;
      background: #000;
      color: white;
      border: none;
      border-radius: 12px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
    }

    body.dark .btn {
      background: #f8fafc;
      color: #0f172a;
    }
  </style>
</head>

<body class="{{ user.theme if user and user.theme else 'light' }}">
  <header class="top-nav">

    <div class="nav-left">
      <a href="/dashboard" class="logo">
        <img src="/static/images/logo.png">
        <span>BuildHub</span>
      </a>
    </div>

    <div class="nav-right">
      <a href="/dashboard">Dashboard</a>
      <a href="/projects">Explore</a>
      <a href="/my_projects">My Work</a>
      <a href="/my_creations">My Creations</a>
      <a href="/leaderboard">Leaderboard</a>
    </div>

  </header>
  <div class="wrapper">
    <div class="container">

      <a href="/my_creations" class="back">← Back to My Creations</a>

      <div class="header">
        <h2>🚀 Create New Project</h2>
        <p>Upload a markdown file or write manually</p>
      </div>

      <div class="card">

        <!-- 🔥 IMPORTANT: enctype -->
        <form method="POST" enctype="multipart/form-data">

          <!-- TITLE -->
          <div class="form-group">
            <label>Project Title</label>
            <input type="text" name="title" required>
          </div>

          <!-- MARKDOWN FILE -->
          <div class="form-group">
            <label>Upload Markdown File (.md)</label>
            <input type="file" name="mdfile" accept=".md" class="file-input">
          </div>

          <!-- OPTIONAL TEXTAREA -->
          <div class="form-group">
            <label>OR Write Description (Optional)</label>
            <textarea name="content" placeholder="If no file uploaded, this will be used..."></textarea>
          </div>

          <button type="submit" class="btn">
            Create Project 🚀
          </button>

        </form>

      </div>

    </div>
  </div>

</body>

</html>
