<!DOCTYPE html>
<html>
<head>
    <title>My Projects</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header>
    <h1>My Projects</h1>
    <a href="/dashboard">Back</a>
</header>

<section>

    {% for project in projects %}
    <div class="card">
        <h2>{{ project.title }}</h2>
        <p>{{ project.description }}</p>
        <p>Status: {{ project.status }}</p>
    </div>
    {% endfor %}

</section>

</body>
</html>
